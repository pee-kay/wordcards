<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="strokes.documentTitle">Stroke order practice</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="strokes-page">
    <div class="container container--wide">
        <header class="page-header no-print">
            <div class="lang-switch" role="group" data-i18n-aria-label="lang.label" aria-label="Language">
                <button type="button" class="lang-btn" data-set-lang="en" aria-pressed="false" data-i18n="lang.en">EN</button>
                <button type="button" class="lang-btn" data-set-lang="ru" aria-pressed="false" data-i18n="lang.ru">RU</button>
            </div>
            <h1 data-i18n="strokes.h1">Stroke order practice</h1>
            <p class="subtitle" data-i18n-html="strokes.subtitle">Build a printable sheet.</p>
            <nav class="site-nav" data-i18n-aria-label="nav.aria" aria-label="Site">
                <a href="index.html" data-i18n="nav.wordCards">Word cards</a>
                <a href="radicals.html" data-i18n="nav.radicals">Missing strokes / radicals</a>
                <a href="strokes.html" aria-current="page" data-i18n="nav.strokes">Stroke order</a>
            </nav>
        </header>

        <div class="section">
            <h2 data-i18n="strokes.wordList">Word list</h2>
            <p class="help" data-i18n-html="strokes.wordListHelp">Formats help.</p>
            <textarea id="strokeWordInput" data-i18n-placeholder="strokes.wordInputPlaceholder" placeholder="永"></textarea>
            <div class="button-group">
                <button type="button" id="strokeExport" data-i18n="strokes.export">Export CSV</button>
                <button type="button" id="strokeImport" data-i18n="strokes.import">Import CSV</button>
            </div>
            <input type="file" id="strokeFileInput" accept=".csv,.txt" class="hidden-file-input" aria-hidden="true">
        </div>

        <div class="section">
            <h2 data-i18n="strokes.layoutSection">Layout & PDF</h2>
            <div class="radical-options stroke-layout-options">
                <label class="field">
                    <span data-i18n="strokes.stepsPerRow">Step boxes per row</span>
                    <input type="number" id="strokeStepsPerRow" min="4" max="24" value="8">
                </label>
                <label class="field">
                    <span data-i18n="strokes.stepSize">Step size (px)</span>
                    <input type="number" id="strokeStepSize" min="40" max="120" value="64">
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="strokeShowPinyin" checked>
                    <span data-i18n="strokes.showPinyin">Show pinyin</span>
                </label>
            </div>
            <div class="button-group">
                <button type="button" id="strokeBuild" class="btn-primary" data-i18n="strokes.generate">Generate</button>
            </div>
            <p id="strokeStats" class="stats">No characters yet</p>
            <div id="strokeWarning" class="warning hidden" role="alert"></div>
            <div id="strokeLoading" class="info hidden" role="status" data-i18n="strokes.loading">Loading…</div>
        </div>

        <div class="section" id="strokePreviewSection">
            <h2 class="no-print" data-i18n="strokes.preview">Preview</h2>
            <p class="help no-print" data-i18n="strokes.previewHelp">Print help.</p>
            <div id="strokePrintRoot" class="print-root stroke-print-root"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
    <script src="https://unpkg.com/pinyin-pro@3.26.0/dist/index.js"></script>
    <script src="i18n.js"></script>
    <script src="strokes.js"></script>
</body>
</html>
